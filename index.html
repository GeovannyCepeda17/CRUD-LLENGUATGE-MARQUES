<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="estilos.css">
    <title>Préstecs de Material</title>
</head>

<body>
    <div class="container mt-5">
        <h1 class="text-center">Préstecs de Material</h1>
        <p class="text-center text-muted">Gestió del material del taller</p>

        <div class="seccio-formulari">
            <div class="grup-camp">
                <label for="nomAlumne">Nom de l'alumne/a:</label>
                <input type="text" id="nomAlumne" class="form-control" placeholder="Escriu el nom aquí">
            </div>
            <div class="grup-camp">
                <label for="material">Material:</label>
                <select id="material" class="form-select">
                    <option value="">Selecciona el material</option>
                    <option value="Carregador">Carregador</option>
                    <option value="Ratolí">Ratolí</option>
                    <option value="Portàtil">Portàtil</option>
                    <option value="Altres">Altres</option>
                </select>
            </div>
            <div class="grup-camp">
                <label>Torn:</label>
                <div>
                    <input type="radio" name="torn" id="tornMati" value="Matí">
                    <label for="tornMati">Matí</label>

                    <input type="radio" name="torn" id="tornTarda" value="Tarda" class="ms-3">
                    <label for="tornTarda">Tarda</label>
                </div>
            </div>

            <div class="grup-camp">
                <input type="checkbox" id="devolt">
                <label for="devolt">Ja ha estat retornat</label>
            </div>

            <div class="grup-camp">
                <button type="button" id="botonGuardar" class="btn btn-primary">Afegir préstec</button>
            </div>
        </div>
        <h2>Llista de préstecs</h2>

        <p id="missatgeBuit" class="text-muted">No hi ha préstecs registrats.</p>

        <div class="table-responsive" id="contenidorTaula" style="display: none;">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Alumne/a</th>
                        <th>Material</th>
                        <th>Torn</th>
                        <th>Retornat</th>
                        <th>Accions</th>
                    </tr>
                </thead>
                <tbody id="cossTaulaPrestecs">
                </tbody>
            </table>
        </div>

    </div>

    <script src="prestecs.js"></script>
</body>

</html>
